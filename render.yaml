# Render Blueprint for MarketPulse X
# Deploy with: Render Dashboard → New → Blueprint → point at this repo.
# https://render.com/docs/blueprint-spec

databases:
  - name: marketpulse-db
    plan: free
    databaseName: marketpulse
    postgresMajorVersion: "16"

services:
  # ---------------------------------------------------------------------------
  # Web service (Next.js app + API routes)
  # ---------------------------------------------------------------------------
  - type: web
    name: marketpulse-x
    runtime: node
    plan: free
    branch: claude/marketpulse-x-app-u1va7d
    buildCommand: npm install && npm run build
    # Sync the Prisma schema to the database before each deploy goes live.
    preDeployCommand: npm run db:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketpulse-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # set in the Render dashboard (secret)
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ADMIN_SECRET
        generateValue: true
      - key: NITTER_INSTANCES
        value: https://nitter.net,https://xcancel.com,https://nitter.poast.org
      - key: POLL_INTERVAL_MINUTES
        value: "15"
      - key: MAX_POSTS_PER_ACCOUNT
        value: "5"
      - key: NODE_VERSION
        value: "20.18.0"

  # ---------------------------------------------------------------------------
  # Cron job: poll feeds + run AI analysis on the configured interval.
  # Runs the standalone worker (npm run poll) every 15 minutes.
  # ---------------------------------------------------------------------------
  - type: cron
    name: marketpulse-poller
    runtime: node
    plan: free
    branch: claude/marketpulse-x-app-u1va7d
    schedule: "*/15 * * * *"
    buildCommand: npm install && npm run build
    startCommand: npm run poll
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketpulse-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: NITTER_INSTANCES
        value: https://nitter.net,https://xcancel.com,https://nitter.poast.org
      - key: MAX_POSTS_PER_ACCOUNT
        value: "5"
      - key: NODE_VERSION
        value: "20.18.0"
