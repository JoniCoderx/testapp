# Render Blueprint for MarketPulse X
# Deploy with: Render Dashboard → New → Blueprint → point at this repo.
# https://render.com/docs/blueprint-spec

databases:
  - name: marketpulse-db
    plan: free
    databaseName: marketpulse
    postgresMajorVersion: "16"

services:
  # ---------------------------------------------------------------------------
  # Web service (Next.js app + API routes)
  # ---------------------------------------------------------------------------
  - type: web
    name: marketpulse-x
    runtime: node
    plan: free
    branch: main
    # Custom domains. Render provisions a managed TLS cert for each once the
    # domain's DNS points at Render (see README → "Custom domain & DNS").
    domains:
      - marketpulsex.online
      - www.marketpulsex.online
    # Generate the Prisma client, create/sync the Postgres schema, then build.
    # The committed schema uses provider "postgresql" so this is correct on
    # Render even before prepare-db.mjs runs (it only flips to sqlite locally).
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketpulse-db
          property: connectionString
      # --- AI provider (pick one; Anthropic Haiku is cheapest) ---
      - key: AI_PROVIDER
        value: auto
      - key: ANTHROPIC_API_KEY
        sync: false # set in the Render dashboard (secret)
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: OPENAI_API_KEY
        sync: false # optional alternative; set in the dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # --- Finnhub live market/news data (server-side key; never exposed) ---
      - key: FINNHUB_API_KEY
        sync: false # set in the Render dashboard; missing key → demo fallback
      - key: ADMIN_SECRET
        generateValue: true
      # --- Free post sources (no paid X API) ---
      - key: NITTER_INSTANCES
        value: https://nitter.net,https://xcancel.com,https://nitter.poast.org
      - key: RSSHUB_INSTANCES
        value: https://rsshub.app
      - key: BLUESKY_API
        value: https://public.api.bsky.app
      - key: ENABLED_SOURCES
        value: ""
      - key: POLL_INTERVAL_MINUTES
        value: "15"
      - key: MAX_POSTS_PER_ACCOUNT
        value: "5"
      # Serve clearly-labeled demo posts when the DB is empty so a fresh deploy
      # is never blank. Set to "false" once live data is flowing.
      - key: DEMO_FALLBACK
        value: "true"
      - key: NODE_VERSION
        value: "20.18.0"

  # ---------------------------------------------------------------------------
  # Cron job: poll feeds + run AI analysis on the configured interval.
  # Runs the standalone worker (npm run poll) every 15 minutes. This is the
  # ONLY automatic path that spends OpenAI credits; public users cannot.
  # ---------------------------------------------------------------------------
  - type: cron
    name: marketpulse-poller
    runtime: node
    plan: free
    branch: main
    schedule: "*/15 * * * *"
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run poll
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketpulse-db
          property: connectionString
      - key: AI_PROVIDER
        value: auto
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: NITTER_INSTANCES
        value: https://nitter.net,https://xcancel.com,https://nitter.poast.org
      - key: RSSHUB_INSTANCES
        value: https://rsshub.app
      - key: BLUESKY_API
        value: https://public.api.bsky.app
      - key: ENABLED_SOURCES
        value: ""
      - key: MAX_POSTS_PER_ACCOUNT
        value: "5"
      - key: NODE_VERSION
        value: "20.18.0"
